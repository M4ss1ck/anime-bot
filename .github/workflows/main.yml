name: Bot CI

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          DATABASE_URL: file:./dev.db
